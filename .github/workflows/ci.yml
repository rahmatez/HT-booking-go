name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: booking
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Apply migrations
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=secret psql -h localhost -p 5433 -U booking -d booking -f backend/migrations/000001_init_schema.up.sql

      - name: Build backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://booking:secret@localhost:5433/booking?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          go build -o bin/api ./cmd/api
          go test ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
