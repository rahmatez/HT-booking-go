version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "user_role"
            go_type: "string"
          - db_type: "event_status"
            go_type: "string"
          - db_type: "booking_status"
            go_type: "string"
          - db_type: "ticket_status"
            go_type: "string"
          - db_type: "payment_status"
            go_type: "string"
